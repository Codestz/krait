version: 2
updates:
  # Keep Cargo dependencies up to date
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      # Group patch + minor updates together to reduce noise
      patch-updates:
        update-types:
          - minor
          - patch

  # Keep GitHub Actions up to date
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
