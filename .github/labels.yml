# Synced via .github/workflows/labels.yml

- name: bug
  color: d73a4a
  description: Something isn't working

- name: enhancement
  color: a2eeef
  description: New feature or improvement

- name: documentation
  color: 0075ca
  description: Improvements or additions to documentation

- name: good first issue
  color: 7057ff
  description: Good for newcomers

- name: help wanted
  color: "008672"
  description: Extra attention is needed

- name: question
  color: d876e3
  description: Further information is requested

- name: duplicate
  color: cfd3d7
  description: This issue or PR already exists

- name: wontfix
  color: ffffff
  description: This will not be worked on

- name: invalid
  color: e4e669
  description: This doesn't seem right

- name: dependencies
  color: 0366d6
  description: Dependency update (Dependabot)

- name: rust
  color: dea584
  description: Rust / Cargo changes

- name: ci
  color: 6e40c9
  description: CI/CD and workflow changes

- name: triage
  color: e99695
  description: Needs initial review

- name: breaking
  color: b60205
  description: Breaking change

- name: performance
  color: 0e8a16
  description: Performance improvement

- name: security
  color: ee0701
  description: Security-related issue or fix

- name: lsp
  color: 5319e7
  description: LSP client or language server changes

- name: daemon
  color: 5319e7
  description: Daemon or socket changes
