name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "Breaking Changes"
    labels:
      - breaking
  - title: "New Features"
    labels:
      - enhancement
  - title: "Bug Fixes"
    labels:
      - bug
  - title: "Performance"
    labels:
      - performance
  - title: "Documentation"
    labels:
      - documentation
  - title: "Dependencies"
    labels:
      - dependencies
  - title: "CI / Infrastructure"
    labels:
      - ci

change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - breaking
  minor:
    labels:
      - enhancement
  patch:
    labels:
      - bug
      - performance
      - documentation
      - dependencies
      - ci
  default: patch

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: $PREVIOUS_TAG...v$RESOLVED_VERSION
